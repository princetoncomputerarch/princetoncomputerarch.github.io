heading: "Location"

intro: >
  This event will be held in Briger Hall, Room D301, on the Princeton University campus.
  Briger is one of the newest buildings on campus, but up-to-date campus maps include it.

# ---------------------------------------------------------------------------
# Directions
# ---------------------------------------------------------------------------
directions_intro: "Directions:"

directions:
  - from: "From Newark Airport (EWR)"
    desc: >
      Take the AirTrain to Newark Airport Station, then NJ Transit's
      Northeast Corridor Line to Princeton Junction. Transfer to the
      Dinky shuttle for one stop to Princeton Station.

  - from: "From NY Penn Station"
    desc: >
      Take NJ Transit's Northeast Corridor Line (Trenton-bound) to
      Princeton Junction, then the Dinky to Princeton Station.

  - from: "From Philadelphia 30th Street Station"
    desc: >
      Take Amtrak (Northeast Regional or Keystone Service) to
      Princeton Junction, then the Dinky to Princeton Station.

  - from: "By car"
    desc: >
      Take Route 1 to the Washington Road exit toward Princeton.
      Visitor parking is at the Stadium Drive Garage.
