heading: "Scope"

paragraphs:
  - >
    NY Architecture and Systems Day will be held at Princeton University
    on Friday, May 15, 2026. Following the tradition of our regional
    community gatherings, we are bringing together faculty and students
    from across the area to share research, discuss new ideas, and
    strengthen our local collaborations in architecture and systems.

  - >
    This will be an opportunity to engage and exchange ideas with fellow
    computer architects and systems researchers in an informal setting.
    We hope to see you there!

